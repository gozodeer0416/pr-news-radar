# ============================================================
# PR 新聞觀測原則（單一調整入口）
#
# 在 GitHub 網頁上編輯這個檔案 → 按 Commit changes → 系統會自動重跑，
# 約 10 分鐘後 dashboard 就會反映新原則，不需要任何其他操作。
#
# 各區塊說明：
#   media       目標媒體清單（增刪媒體、調整 tier 都在這裡）
#   topics      Google News 搜尋關鍵字組（每家媒體 × 每組 topic 各查一次）
#   principles  給 Claude 分類器的判準文字（改文字即改判斷標準）
#   lookback_days  每次執行回看幾天的新聞
# ============================================================

media:
  - name: TechCrunch
    domain: techcrunch.com
    tier: 1
  - name: The Verge
    domain: theverge.com
    tier: 1
  - name: WSJ
    domain: wsj.com
    tier: 1
  - name: VentureBeat
    domain: venturebeat.com
    tier: 2
  - name: InfoWorld
    domain: infoworld.com
    tier: 2
  - name: Computerworld
    domain: computerworld.com
    tier: 2
  - name: TechRepublic
    domain: techrepublic.com
    tier: 2
  - name: SiliconANGLE
    domain: siliconangle.com
    tier: 2
  - name: Diginomica
    domain: diginomica.com
    tier: 3
  - name: The Register
    domain: theregister.com
    tier: 3
  - name: Inc.
    domain: inc.com
    tier: 3

# Google News 查詢關鍵字組（英文媒體用英文查詢）
topics:
  - '"no-code" OR "low-code"'
  - '"AI agent" startup'
  - 'AI "small business" software'
  - 'startup AI productivity tool'
  - 'AI database OR spreadsheet automation'

# 每次執行回看天數（每週跑一次，多抓 1 天防漏；去重機制會擋掉重複）
lookback_days: 8

principles:
  # 「與 Ragic 可比的公司」定義——這段文字會直接進分類 prompt
  company_profile: >
    與 Ragic 規模相近的公司定義：約 10–70 人的 B2B 軟體公司，
    低市場知名度（在 tier1, tier2 媒體曝光總數低於 2），
    領域為 AI、no-code/low-code、SaaS、資料庫、企業生產力工具。
    規模分級：A = 人數與知名度都與 Ragic 接近；
    B = 知名度接近但團隊更小（2–10 人）；
    U = 規模接近但知名度明顯較高（上緣參考樣本）；
    unknown = 文中資訊不足以判斷。

  # 排除規則——這段文字會直接進分類 prompt
  exclude: >
    排除以募資、估值、ARR、IPO、財報、併購、裁員、高階主管異動
    為主要新聞點的文章。大公司（如 Google、Microsoft、OpenAI、Salesforce
    等知名企業）的產品新聞也排除，除非文章主角是一家小公司。
    產品新聞只在背景段落交代歷史募資時不排除。
    也排除純廠商投稿（sponsored/contributed content）與純清單型 SEO 文章。

  # 切角分類法（分類器只能從這些選一個）
  angles:
    - id: product-launch
      label: 產品發布
      desc: 新產品或新功能發布為主軸，含 CEO 訪談與 demo
    - id: hands-on
      label: 記者實測
      desc: 記者親自測試產品並給出獨立評價
    - id: customer-roi
      label: 客戶案例/ROI
      desc: 具名客戶的導入成效、省時省錢數字
    - id: security-incident
      label: 資安事件/研究
      desc: 漏洞、攻擊、事故、資安研究成果
    - id: founder-story
      label: 創辦人親歷
      desc: 創辦人第一人稱經驗、失敗或衝突故事
    - id: trend-quote
      label: 趨勢引言
      desc: 公司或創辦人作為專家出現在趨勢分析中
    - id: research-benchmark
      label: 研究/Benchmark
      desc: 公司發布的研究、數據或 benchmark 被報導
    - id: other
      label: 其他
      desc: 不屬於以上任何一類
